<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>ひらがな並び替えクイズ</title>
    <style>
        /* --- 1. ページ全体の設定（最大幅800px・中央寄せ） --- */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background: #f9f9f9; 
            margin: 0 auto;       /* 左右をオートにして中央寄せ */
            padding: 15px; 
            max-width: 800px;     /* 全体の幅を800pxに制限 */
            box-sizing: border-box;
            overflow-x: hidden;   /* 横揺れ防止 */
        }

        /* --- 2. 画像の強制リサイズ（800pxからはみ出さない・中央寄せ） --- */
        img {
            max-width: 100% !important; /* 親の幅（最大800px）を超えない */
            height: auto !important;    /* 比率を維持 */
            display: block;
            margin: 0 auto 20px auto;   /* 中央寄せ＆下の余白 */
        }

        /* --- 3. クイズボックスと要素のスタイル --- */
        .quiz-box { 
            border: 2px solid #333; 
            padding: 20px; 
            border-radius: 15px; 
            display: block;        /* inline-blockから変更して幅を安定させる */
            background: white;
            width: 100%; 
            max-width: 500px;      /* クイズ部分の見た目を整えるための制限 */
            margin: 0 auto;        /* 中央寄せ */
            box-sizing: border-box; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .question { 
            font-size: 22px; 
            margin: 20px 0; 
            font-weight: bold;
            color: #333;
        }

        input[type="text"] { 
            font-size: 20px; 
            padding: 10px; 
            width: 90%; 
            max-width: 300px; 
            text-align: center; 
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        button { 
            font-size: 16px; 
            padding: 12px 20px; 
            margin: 5px; 
            cursor: pointer;
            border: none;
            border-radius: 25px;
            background: #4caf50;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* ボタンの色分け */
        #startBtn, #restartBtn { background: #ff9800; width: 80%; max-width: 250px; }
        #answerBtn { background: #2196f3; }
        #voiceStartBtn { background: #673ab7; }
        #voiceStopBtn { background: #f44336; }

        #result { margin-top: 15px; font-size: 18px; min-height: 1.5em; font-weight: bold; }
        #score { margin-top: 15px; font-size: 20px; font-weight: bold; color: #ff9800; }
        .voice-setting { margin: 15px 0; font-size: 0.9em; }

        /* --- 4. レスポンシブ設定 --- */
        @media (max-width: 600px) {
            h1 { font-size: 1.5em; }
            button { width: 90%; max-width: 280px; margin: 5px auto; display: block; }
            .quiz-box { padding: 15px; }
        }
    </style>
</head>
<body>

<img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="タイトル画像">

<h1>ひらがな並び替えクイズ</h1>
<p>答えは漢字、一部カタカナでもOKです。</p>
<p>変な質問がたまに出てきます。それを探すのも面白いですよ。</p>
<div class="quiz-box">
    <div id="quiz" class="question">ゲームスタートを押してください</div>
    <input type="text" id="answer" placeholder="答えを入力" disabled>
    
    <div class="voice-setting">
        <input type="checkbox" id="voice-enabled" checked>
        <label for="voice-enabled">音声ガイドを有効にする</label>
    </div>
    
    <button id="startBtn" onclick="startGame()">ゲームスタート</button>
    <button id="restartBtn" onclick="restartGame()" style="display:none;">再スタート</button>
    <button onclick="checkAnswer()" id="answerBtn" disabled>答える</button>
    
    <div style="margin-top: 10px;">
        <button id="voiceStartBtn" onclick="startVoice()">👉 音声入力開始</button>
        <button id="voiceStopBtn" onclick="stopVoice()" disabled>👉 音声入力停止</button>
    </div>
    
    <div id="voiceStatus"></div>
    <div id="result"></div>
    <div id="score"></div>
</div>
<p></p> 
  <div class="footer-info">
    <div class="info-text">
     今回のアプリは如何だったでしょうか？他にも使えるアプリ、脳トレができるゲームや趣味に俳句、和歌などが利用できるサイトをご案内します。また大事な記録をサーバーに残せるサイトで、何かあった時に情報開示も指定できるサイトです。スマホのID、PWを記録しておくと安心です。
    </div>
    <img src="https://life-supporter.jp/sp/hxySQ4ff/8BaRR2j8/images/XS012098.jpg" style="display:block; margin:20px auto; max-width:100%;">
    <div style="text-align:center;"><span style="font-size:18px;"><b></b></span></div>
  </div>
<p></p>  

<p></p>    
<!-- 14日体験案内-->  
  <input type="file" id="jsonFile" style="display:none">
  <input type="file" id="excelFile" style="display:none" accept=".xlsx,.xls">
</div>

<script>
// --- クイズデータとロジック（そのまま維持） ---
const quizzes = [
    {q:"ずみ", a:"みず", aKanji:"水"}, {q:"らそ", a:"そら", aKanji:"空"}, {q:"なは", a:"はな", aKanji:"花"}, {q:"まや", a:"やま", aKanji:"山"}, {q:"わか", a:"かわ", aKanji:"川"}, {q:"みう", a:"うみ", aKanji:"海"}, {q:"ごんり", a:"りんご", aKanji:"リンゴ"}, {q:"しす", a:"すし", aKanji:"寿司"}, {q:"んうど", a:"うどん", aKanji:"うどん"}, {q:"ばそ", a:"そば", aKanji:"蕎麦"}, {q:"ぬきた", a:"たぬき", aKanji:"狸"}, {q:"こね", a:"ねこ", aKanji:"猫"}, {q:"ぬい", a:"いぬ", aKanji:"犬"}, {q:"まるく", a:"くるま", aKanji:"車"}, {q:"ほすま", a:"すまほ", aKanji:"スマホ"},
    {q:"かんみ", a:"みかん", aKanji:"みかん"}, {q:"ちごい", a:"いちご", aKanji:"いちご"}, {q:"ろぷらてん", a:"てんぷら", aKanji:"天ぷら"}, {q:"きすやき", a:"すきやき", aKanji:"すき焼き"}, {q:"ぎさう", a:"うさぎ", aKanji:"兎"}, {q:"しゃでん", a:"でんしゃ", aKanji:"電車"}, {q:"しゃじてん", a:"じてんしゃ", aKanji:"自転車"}, {q:"ばんか", a:"かばん", aKanji:"鞄"}, {q:"びてれ", a:"てれび", aKanji:"テレビ"}, {q:"こんぱそ", a:"ぱそこん", aKanji:"パソコン"}, {q:"きょうと", a:"とうきょう", aKanji:"東京"}, {q:"さかおお", a:"おおさか", aKanji:"大阪"}, {q:"しあ", a:"あし", aKanji:"足"}, {q:"がみて", a:"てがみ", aKanji:"手紙"}, {q:"はまよこ", a:"よこはま", aKanji:"横浜"},
    {q:"んぼさくら", a:"さくらんぼ", aKanji:"さくらんぼ"}, {q:"ぎにりお", a:"おにぎり", aKanji:"おにぎり"}, {q:"あげから", a:"からあげ", aKanji:"唐揚げ"}, {q:"こうくう", a:"くうこう", aKanji:"空港"}, {q:"ぶんしん", a:"しんぶん", aKanji:"新聞"}, {q:"しょじい", a:"じしょ", aKanji:"辞書"}, {q:"りりょう", a:"りょうり", aKanji:"料理"}, {q:"がめね", a:"めがね", aKanji:"眼鏡"}, {q:"きだほん", a:"ほんだな", aKanji:"本棚"}, {q:"ぱんあん", a:"あんぱん", aKanji:"あんパン"}, {q:"てんきっさ", a:"きっさてん", aKanji:"喫茶店"}, {q:"ういき", a:"きうい", aKanji:"キウイ"},
    {q:"がんくお", a:"おんがく", aKanji:"音楽"}, {q:"ううんど", a:"うんどう", aKanji:"運動"}, {q:"いものか", a:"かいもの", aKanji:"買い物"}, {q:"せせんい", a:"せんせい", aKanji:"先生"}, {q:"せくいが", a:"がくせい", aKanji:"学生"}, {q:"いうんびょ", a:"びょういん", aKanji:"病院"}, {q:"しゃさおんい", a:"おいしゃさん", aKanji:"お医者さん"}, {q:"きゅやう", a:"やきゅう", aKanji:"野球"}, {q:"おいんばり", a:"バイオリン", aKanji:"バイオリン"}, {q:"ろっぽさ", a:"さっぽろ", aKanji:"札幌"},
    {q:"んかんんせし", a:"しんかんせん", aKanji:"新幹線"}, {q:"うぶつえどん", a:"どうぶつえん", aKanji:"動物園"}, {q:"たとうきーょわ", a:"きょうとタワー", aKanji:"京都タワー"}, {q:"うわーときたょう", a:"とうきょうタワー", aKanji:"東京タワー"}, {q:"うしどゃじ", a:"じどうしゃ", aKanji:"自動車"}, {q:"うくうきひ", a:"ひこうき", aKanji:"飛行機"}
];

let currentQuiz; let score = 0; let total = 0; const maxQuestions = 10; let usedQuizzes = []; let recognition;
const synth = window.speechSynthesis; let femaleVoice = null;
const voiceEnabledCheckbox = document.getElementById('voice-enabled'); 

function setupVoice() {
    const voices = synth.getVoices();
    femaleVoice = voices.find(v => v.lang === 'ja-JP' && (v.name.includes('Google') || v.name.includes('Kyoko') || v.name.includes('Otoya') || v.name.includes('Female'))) || voices.find(v => v.lang === 'ja-JP');
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = setupVoice; else setupVoice();

function speak(text) {
    if (!synth || !voiceEnabledCheckbox.checked) return;
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ja-JP'; if (femaleVoice) utter.voice = femaleVoice;
    synth.speak(utter);
}

function startGame(){
    score = 0; total = 0; usedQuizzes = [];
    document.getElementById("score").textContent = ""; document.getElementById("result").textContent = "";
    document.getElementById("startBtn").style.display = "none"; document.getElementById("restartBtn").style.display = "inline-block";
    document.getElementById("answer").disabled = false; document.getElementById("answerBtn").disabled = false;
    setQuiz();
}

function restartGame(){ startGame(); }

function setQuiz(){
    if(total >= maxQuestions){ endGame(); return; }
    let newQuiz;
    do { newQuiz = quizzes[Math.floor(Math.random()*quizzes.length)]; } while(usedQuizzes.includes(newQuiz));
    usedQuizzes.push(newQuiz);
    currentQuiz = newQuiz;
    document.getElementById("quiz").textContent = "第 " + (total+1) + " 問: 並べ替え → 「" + currentQuiz.q + "」";
    speak(currentQuiz.q);
    document.getElementById("answer").value = ""; document.getElementById("answer").focus();
}

function checkAnswer(){
    if(total >= maxQuestions) return;
    const ansRaw = document.getElementById("answer").value.trim();
    const result = document.getElementById("result");
    const correctKana = kanaConvert(currentQuiz.a);
    const userAnsNormalized = kanaConvert(ansRaw);
    const correctDisplay = currentQuiz.aKanji || currentQuiz.a;

    if (userAnsNormalized === correctKana || ansRaw === correctDisplay) {
        score++;
        result.textContent = "🌟 正解！ → 「" + correctDisplay + "」";
        result.style.color = "green";
        speak("正解です。");
    } else {
        result.textContent = "🌟 不正解！ 正解は「" + correctDisplay + "」";
        result.style.color = "red";
        speak("不正解です。正解は" + correctDisplay + "でした。");
    }
    total++;
    document.getElementById("score").textContent = "スコア: " + score + " / " + total;
    setTimeout(total >= maxQuestions ? endGame : setQuiz, 1500);
}

function endGame(){
    document.getElementById("quiz").textContent = "🌟 ゲーム終了！";
    document.getElementById("result").textContent = "あなたのスコアは " + score + " / " + maxQuestions + " です。";
    document.getElementById("answer").disabled = true; document.getElementById("answerBtn").disabled = true;
    speak("終了です。スコアは" + score + "点でした。");
}

if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP'; recognition.interimResults = false; recognition.continuous = true;
    recognition.onresult = (e) => { document.getElementById("answer").value = e.results[e.results.length-1][0].transcript.trim(); };
    recognition.onend = () => { 
        document.getElementById("voiceStatus").textContent = "";
        document.getElementById("voiceStartBtn").disabled = false;
        document.getElementById("voiceStopBtn").disabled = true;
    };
}

function startVoice(){
    if(!recognition){ alert("対応していません"); return; }
    recognition.start();
    document.getElementById("voiceStatus").textContent = "🌟 音声入力中…";
    document.getElementById("voiceStartBtn").disabled = true;
    document.getElementById("voiceStopBtn").disabled = false;
}
function stopVoice(){ if(recognition) recognition.stop(); }

function kanaConvert(text){
    let res = text.replace(/[ァ-ン]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60));
    return res.replace(/[ー 　]/g,'');
}
</script>
</body>
</html>
